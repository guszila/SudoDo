<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="gloop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gloop2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <!-- Glass circle bg -->
  <rect x="2" y="2" width="92" height="92" rx="26" fill="white" fill-opacity="0.55" stroke="white" stroke-opacity="0.8" stroke-width="1.5"/>
  <!-- Left ring -->
  <circle cx="34" cy="48" r="20" fill="none" stroke="url(#gloop)" stroke-width="8"/>
  <!-- Right ring -->
  <circle cx="62" cy="48" r="20" fill="none" stroke="url(#gloop2)" stroke-width="8"/>
  <!-- White mask -->
  <rect x="44" y="28" width="12" height="40" fill="white"/>
  <!-- Front arc -->
  <path d="M44 33 Q48 48 44 63" stroke="url(#gloop)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M56 33 Q52 48 56 63" stroke="url(#gloop2)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Dots -->
  <circle cx="17" cy="48" r="6" fill="#f472b6"/>
  <circle cx="79" cy="48" r="6" fill="#a78bfa"/>
</svg>
