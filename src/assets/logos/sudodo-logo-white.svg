<svg xmlns="http://www.w3.org/2000/svg" width="320" height="100" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="gloop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.7)"/>
    </linearGradient>
  </defs>
  <!-- Transparent bg (for use on colored backgrounds) -->
  <!-- Glass pill -->
  <rect x="4" y="8" width="88" height="84" rx="22" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- Left ring -->
  <circle cx="32" cy="50" r="22" fill="none" stroke="white" stroke-opacity="0.9" stroke-width="8"/>
  <!-- Right ring -->
  <circle cx="68" cy="50" r="22" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="8"/>
  <!-- Transparent mask — use a subtle tinted rect -->
  <rect x="43" y="28" width="14" height="44" fill="white" fill-opacity="0.01"/>
  <!-- Front arc -->
  <path d="M43 34 Q50 50 43 66" stroke="white" stroke-opacity="0.9" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M57 34 Q50 50 57 66" stroke="white" stroke-opacity="0.6" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Dots -->
  <circle cx="14" cy="50" r="7" fill="white" fill-opacity="0.9"/>
  <circle cx="86" cy="50" r="7" fill="white" fill-opacity="0.6"/>
  <!-- Wordmark white -->
  <text x="108" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="white">SudoDo</text>
  <text x="110" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="white" fill-opacity="0.6" letter-spacing="4">TASK MANAGER</text>
</svg>
